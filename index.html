<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>لعبة الأبواب والمكعب</title>
  <style>
    * { touch-action: none; box-sizing: border-box; }
    body { margin: 0; padding: 0; overflow: hidden; background: #111; font-family: sans-serif; }
    
    /* شريط ثابت ومستقل فوق اللعبة تماماً */
    #ui { 
      position: absolute; 
      top: 10px; 
      left: 10px; 
      right: 10px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      z-index: 99999;
      background: rgba(0, 0, 0, 0.85);
      padding: 10px 15px;
      border-radius: 10px;
      border: 1px solid #444;
    }
    #score { font-size: 18px; font-weight: bold; color: #fff; }
    #target { 
      padding: 5px 12px; 
      border-radius: 6px; 
      color: #000; 
      font-size: 16px; 
      font-weight: bold; 
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="ui">
    <div id="score">النتيجة: 0</div>
    <div id="target">الهدف: أخضر</div>
  </div>

  <script>
    let score = 0;
    let speed = 0.12;
    let targetColor = "أخضر";
    const colorsMap = { "أصفر": 0xffff00, "أخضر": 0x00ff00, "أزرق": 0x0000ff, "أحمر": 0xff0000 };
    const colorNames = ["أصفر", "أخضر", "أزرق", "أحمر"];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1.2);
    light.position.set(0, 15, 10);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x777777));

    // أرضية الممر
    const floorGeo = new THREE.BoxGeometry(6, 0.1, 2000);
    const floorMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.position.set(0, -0.05, -1000);
    scene.add(floor);

    // المكعب
    const cubeGeo = new THREE.BoxGeometry(0.7, 0.7, 0.7);
    const cubeMat = new THREE.MeshLambertMaterial({ color: colorsMap[targetColor] });
    const cube = new THREE.Mesh(cubeGeo, cubeMat);
    cube.position.set(0, 0.35, 0);
    scene.add(cube);

    // الأبواب
    const doorsGroup = new THREE.Group();
    doorsGroup.position.set(0, 0, -15);
    scene.add(doorsGroup);

    const doorPositions = [-2.1, -0.7, 0.7, 2.1];
    doorPositions.forEach((x, i) => {
      const doorGeo = new THREE.BoxGeometry(1.3, 2.2, 0.2);
      const doorMat = new THREE.MeshLambertMaterial({ color: colorsMap[colorNames[i]] });
      const door = new THREE.Mesh(doorGeo, doorMat);
      door.position.set(x, 1.1, 0);
      doorsGroup.add(door);
    });

    let currentDoorZ = -15;
    let isDragging = false;
    let previousX = 0;

    window.addEventListener('pointerdown', (e) => { isDragging = true; previousX = e.clientX; });
    window.addEventListener('pointerup', () => { isDragging = false; });
    window.addEventListener('pointermove', (e) => {
      if (isDragging) {
        const deltaX = (e.clientX - previousX) * 0.01;
        cube.position.x = Math.max(-2.1, Math.min(2.1, cube.position.x + deltaX));
        previousX = e.clientX;
      }
    });

    function updateTarget() {
      targetColor = colorNames[Math.floor(Math.random() * colorNames.length)];
      cube.material.color.setHex(colorsMap[targetColor]);
      const targetElem = document.getElementById('target');
      targetElem.innerText = "الهدف: " + targetColor;
      targetElem.style.backgroundColor = '#' + colorsMap[targetColor].toString(16).padStart(6, '0');
    }

    updateTarget();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);

      // تحريك المكعب للأمام
      cube.position.z -= speed;

      // ضبط الكاميرا لتكون مرتفعة وواضحة جداً
      camera.position.z = cube.position.z + 6;
      camera.position.y = 4.5;
      camera.position.x = cube.position.x * 0.4;
      camera.lookAt(cube.position.x, 0.5, cube.position.z - 4);

      // اجتياز الأبواب
      if (cube.position.z <= currentDoorZ) {
        let x = cube.position.x;
        let chosen = "أصفر";
        if (x > 1.0) chosen = "أحمر";
        else if (x > 0) chosen = "أزرق";
        else if (x > -1.0) chosen = "أخضر";

        if (chosen === targetColor) {
          score++;
          document.getElementById('score').innerText = "النتيجة: " + score;
          currentDoorZ -= 25;
          doorsGroup.position.z = currentDoorZ;
          updateTarget();
        } else {
          score = 0;
          speed = 0.12;
          document.getElementById('score').innerText = "النتيجة: 0";
          cube.position.set(0, 0.35, 0);
          currentDoorZ = -15;
          doorsGroup.position.z = -15;
          updateTarget();
        }
      }

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
