<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>لعبة القتال والطبيعة</title>
  <style>
    * { touch-action: none; box-sizing: border-box; user-select: none; }
    body { margin: 0; padding: 0; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; color: white; }
    
    /* الشاشة والنتيجة */
    #ui { 
      position: absolute; 
      top: 15px; 
      left: 15px; 
      right: 15px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.6);
      padding: 10px 20px;
      border-radius: 12px;
      backdrop-filter: blur(4px);
    }
    #score { font-size: 18px; font-weight: bold; color: #2ecc71; }
    #health { font-size: 18px; font-weight: bold; color: #e74c3c; }
    
    /* مؤشر التصويب */
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 16px;
      height: 16px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 1000;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: #ffffff;
      box-shadow: 0 0 4px #000;
    }
    #crosshair::before { top: 7px; left: 0; width: 16px; height: 2px; }
    #crosshair::after { top: 0; left: 7px; width: 2px; height: 16px; }

    /* أزرار التحكم اللمسية للآيباد والجوال */
    .btn {
      position: absolute;
      background: rgba(0, 0, 0, 0.5);
      border: 2px solid rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      color: white;
      font-weight: bold;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .btn:active { background: rgba(255, 255, 255, 0.4); }

    /* زر القفز */
    #jumpBtn { bottom: 120px; right: 30px; width: 65px; height: 65px; font-size: 22px; background: rgba(52, 152, 219, 0.7); }
    /* زر الإطلاق */
    #shootBtn { bottom: 30px; right: 30px; width: 80px; height: 80px; font-size: 18px; background: rgba(231, 76, 60, 0.8); }

    /* أزرار الحركة (مشي) */
    #moveControls {
      position: absolute;
      bottom: 30px;
      left: 30px;
      width: 130px;
      height: 130px;
      z-index: 1000;
    }
    .m-btn {
      position: absolute;
      width: 42px;
      height: 42px;
      background: rgba(0,0,0,0.5);
      border: 2px solid #fff;
      border-radius: 10px;
      color: white;
      font-size: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #btnUp { top: 0; left: 44px; }
    #btnDown { bottom: 0; left: 44px; }
    #btnLeft { top: 44px; left: 0; }
    #btnRight { top: 44px; right: 0; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div id="ui">
    <div id="score">القتلى: 0</div>
    <div id="health">الصحة: 100%</div>
  </div>

  <div id="crosshair"></div>

  <div id="moveControls">
    <div class="m-btn" id="btnUp">▲</div>
    <div class="m-btn" id="btnDown">▼</div>
    <div class="m-btn" id="btnLeft">◄</div>
    <div class="m-btn" id="btnRight">►</div>
  </div>

  <div class="btn" id="jumpBtn">⬆️</div>
  <div class="btn" id="shootBtn">💥</div>

  <script>
    let score = 0;
    let health = 100;
    let enemies = [];
    let bullets = [];

    // 1. المشهد والكاميرا والجو (سماء وطبيعة)
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb); // لون السماء الأزرق
    scene.fog = new THREE.FogExp2(0x87ceeb, 0.008);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.7, 0); // ارتفاع اللاعب

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // الإضاءة (إضاءة شمس طبيعية)
    const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
    sunLight.position.set(20, 40, 20);
    scene.add(sunLight);
    scene.add(new THREE.AmbientLight(0x779977));

    // 2. الأرضية الخضراء (عشب)
    const floorGeo = new THREE.PlaneGeometry(200, 200);
    const floorMat = new THREE.MeshLambertMaterial({ color: 0x2e8b57 }); // لون العشب الأخضر
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // إضافة جبال شجرية بالخلفية
    function createMountains() {
      for(let i = 0; i < 20; i++) {
        const mGeo = new THREE.ConeGeometry(8 + Math.random()*8, 15 + Math.random()*15, 5);
        const mMat = new THREE.MeshLambertMaterial({ color: 0x3d5229 });
        const m = new THREE.Mesh(mGeo, mMat);
        const angle = (i / 20) * Math.PI * 2;
        m.position.set(Math.cos(angle)*90, 7, Math.sin(angle)*90);
        scene.add(m);
      }
    }
    createMountains();

    // 3. مجسم السلاح
    const gunGroup = new THREE.Group();
    const gunBody = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.12, 0.4), new THREE.MeshLambertMaterial({ color: 0x222222 }));
    const gunBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.3), new THREE.MeshLambertMaterial({ color: 0x111111 }));
    gunBarrel.rotation.x = Math.PI / 2;
    gunBarrel.position.set(0, 0.02, -0.25);
    gunGroup.add(gunBody, gunBarrel);
    gunGroup.position.set(0.2, -0.2, -0.4);
    camera.add(gunGroup);
    scene.add(camera);

    // 4. صناعة شخصية إنسان واقعية للأعداء
    function createHumanEnemy() {
      const human = new THREE.Group();

      // خامة ملابس عسكرية/واقعية
      const skinMat = new THREE.MeshLambertMaterial({ color: 0xd2b48c }); // لون البشرة
      const shirtMat = new THREE.MeshLambertMaterial({ color: 0x3b5323 }); // قميص زيتي
      const pantsMat = new THREE.MeshLambertMaterial({ color: 0x1c2833 }); // بنطال داكن

      // الرأس
      const head = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), skinMat);
      head.position.y = 1.6;

      // الجسم
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.6, 0.25), shirtMat);
      body.position.y = 1.15;

      // اليدين
      const armL = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.5, 0.15), shirtMat);
      armL.position.set(-0.35, 1.15, 0);
      const armR = armL.clone();
      armR.position.x = 0.35;

      // الرجلين
      const legL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.2), pantsMat);
      legL.position.set(-0.15, 0.5, 0);
      const legR = legL.clone();
      legR.position.x = 0.15;

      human.add(head, body, armL, armR, legL, legR);

      // ظهور الأعداء بمكان عشوائي
      const angle = Math.random() * Math.PI * 2;
      const dist = 25 + Math.random() * 15;
      human.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);

      scene.add(human);
      enemies.push(human);
    }

    // توليد الأعداء باستمرار
    setInterval(() => {
      if (enemies.length < 6 && health > 0) createHumanEnemy();
    }, 2500);

    // 5. الفيزياء والحركة (المشي والقفز)
    let moveF = false, moveB = false, moveL = false, moveR = false;
    let velocityY = 0;
    let isGrounded = true;

    // ربط أزرار الحركة اللمسية
    const bindBtn = (id, setVal) => {
      const el = document.getElementById(id);
      el.addEventListener('pointerdown', (e) => { e.stopPropagation(); setVal(true); });
      el.addEventListener('pointerup', (e) => { e.stopPropagation(); setVal(false); });
    };

    bindBtn('btnUp', v => moveF = v);
    bindBtn('btnDown', v => moveB = v);
    bindBtn('btnLeft', v => moveL = v);
    bindBtn('btnRight', v => moveR = v);

    // زر القفز
    document.getElementById('jumpBtn').addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      if (isGrounded) {
        velocityY = 0.18;
        isGrounded = false;
      }
    });

    // النظر بالسحب على الشاشة
    let isLooking = false, prevX = 0, prevY = 0, lon = 0, lat = 0;
    window.addEventListener('pointerdown', (e) => {
      if (!e.target.closest('#moveControls') && !e.target.classList.contains('btn')) {
        isLooking = true; prevX = e.clientX; prevY = e.clientY;
      }
    });
    window.addEventListener('pointerup', () => isLooking = false);
    window.addEventListener('pointermove', (e) => {
      if (isLooking) {
        lon += (e.clientX - prevX) * 0.3;
        lat -= (e.clientY - prevY) * 0.3;
        lat = Math.max(-85, Math.min(85, lat));
        prevX = e.clientX; prevY = e.clientY;

        const phi = THREE.MathUtils.degToRad(90 - lat);
        const theta = THREE.MathUtils.degToRad(lon);

        const target = new THREE.Vector3();
        target.x = camera.position.x + Math.sin(phi) * Math.cos(theta);
        target.y = camera.position.y + Math.cos(phi);
        target.z = camera.position.z + Math.sin(phi) * Math.sin(theta);
        camera.lookAt(target);
      }
    });

    // 6. إطلاق النار
    function shoot() {
      if (health <= 0) return;
      gunGroup.position.z = -0.3;
      setTimeout(() => gunGroup.position.z = -0.4, 70);

      const bullet = new THREE.Mesh(
        new THREE.SphereGeometry(0.06, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0xffcc00 })
      );

      const dir = new THREE.Vector3();
      camera.getWorldDirection(dir);
      bullet.position.copy(camera.position).add(dir.clone().multiplyScalar(0.4));
      bullet.userData = { dir: dir };

      scene.add(bullet);
      bullets.push(bullet);
    }

    document.getElementById('shootBtn').addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      shoot();
    });

    // 7. الحلقة الرئيسية للعب والتحريك
    function animate() {
      requestAnimationFrame(animate);
      if (health <= 0) return;

      // حساب اتجاهات الحركة
      const dir = new THREE.Vector3();
      camera.getWorldDirection(dir);
      dir.y = 0; dir.normalize();

      const sideDir = new THREE.Vector3(-dir.z, 0, dir.x);

      if (moveF) camera.position.add(dir.clone().multiplyScalar(0.12));
      if (moveB) camera.position.sub(dir.clone().multiplyScalar(0.12));
      if (moveL) camera.position.sub(sideDir.clone().multiplyScalar(0.12));
      if (moveR) camera.position.add(sideDir.clone().multiplyScalar(0.12));

      // القفز والجاذبية
      camera.position.y += velocityY;
      if (!isGrounded) {
        velocityY -= 0.009; // جاذبية
        if (camera.position.y <= 1.7) {
          camera.position.y = 1.7;
          velocityY = 0;
          isGrounded = true;
        }
      }

      // حركة الطلقات
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.position.add(b.userData.dir.clone().multiplyScalar(0.9));

        for (let j = enemies.length - 1; j >= 0; j--) {
          const e = enemies[j];
          if (b.position.distanceTo(e.position) < 1.2) {
            scene.remove(e);
            enemies.splice(j, 1);
            scene.remove(b);
            bullets.splice(i, 1);
            score++;
            document.getElementById('score').innerText = "القتلى: " + score;
            break;
          }
        }

        if (b && b.position.distanceTo(camera.position) > 60) {
          scene.remove(b);
          bullets.splice(i, 1);
        }
      }

      // تحريك الأعداء باتجاهك
      for (let i = 0; i < enemies.length; i++) {
        const e = enemies[i];
        e.lookAt(camera.position.x, 0, camera.position.z);
        e.translateZ(0.045);

        if (e.position.distanceTo(camera.position) < 1.3) {
          health -= 1;
          document.getElementById('health').innerText = "الصحة: " + Math.max(0, health) + "%";
          if (health <= 0) {
            alert("🎯 انتهت الموجه! قتلت: " + score + " أعداء.");
            location.reload();
          }
        }
      }

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
