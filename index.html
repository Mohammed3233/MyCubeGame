<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لعبة الأبواب والمكعب</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; color: white; }
    #ui { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 20px; font-weight: bold; z-index: 10; }
    #target { padding: 5px 15px; border-radius: 8px; color: black; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="ui">
    <div id="score">النتيجة: 0</div>
    <div id="target">الهدف: أخضر</div>
  </div>

  <script>
    let score = 0;
    let speed = 0.15;
    let targetColor = "أخضر";
    const colorsMap = { "أصفر": 0xffff00, "أخضر": 0x00ff00, "أزرق": 0x0000ff, "أحمر": 0xff0000 };
    const colorNames = ["أصفر", "أخضر", "أزرق", "أحمر"];

    // 1. إنشاء المشهد والكاميرا
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // الإضاءة
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(0, 10, 10);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    // 2. السيب (الأرضية)
    const floorGeo = new THREE.BoxGeometry(7, 0.1, 2000);
    const floorMat = new THREE.MeshLambertMaterial({ color: 0x444444 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.position.set(0, -0.05, -1000);
    scene.add(floor);

    // 3. المكعب (اللاعب)
    const cubeGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
    const cubeMat = new THREE.MeshLambertMaterial({ color: colorsMap[targetColor] });
    const cube = new THREE.Mesh(cubeGeo, cubeMat);
    cube.position.set(0, 0.4, 25);
    scene.add(cube);

    // 4. الأبواب
    const doorsGroup = new THREE.Group();
    doorsGroup.position.set(0, 0, 10);
    scene.add(doorsGroup);

    const doorPositions = [-2.4, -0.8, 0.8, 2.4];
    const doorMeshes = [];

    doorPositions.forEach((x, i) => {
      const doorGeo = new THREE.BoxGeometry(1.6, 3.5, 0.3);
      const doorMat = new THREE.MeshLambertMaterial({ color: colorsMap[colorNames[i]] });
      const door = new THREE.Mesh(doorGeo, doorMat);
      door.position.set(x, 1.75, 0);
      doorsGroup.add(door);
      doorMeshes.push(door);
    });

    let currentDoorZ = 10;

    // التحكم باللمس/السحب
    let isDragging = false;
    let previousX = 0;

    window.addEventListener('pointerdown', (e) => { isDragging = true; previousX = e.clientX; });
    window.addEventListener('pointerup', () => { isDragging = false; });
    window.addEventListener('pointermove', (e) => {
      if (isDragging) {
        const deltaX = (e.clientX - previousX) * 0.01;
        cube.position.x = Math.max(-2.4, Math.min(2.4, cube.position.x + deltaX));
        previousX = e.clientX;
      }
    });

    function updateTarget() {
      targetColor = colorNames[Math.floor(Math.random() * colorNames.length)];
      cube.material.color.setHex(colorsMap[targetColor]);
      document.getElementById('target').innerText = "الهدف: " + targetColor;
      document.getElementById('target').style.backgroundColor = '#' + colorsMap[targetColor].toString(16).padStart(6, '0');
    }

    updateTarget();

    // الحلقة الرئيسية للعبة (تشتغل 24 ساعة بدون توقف وبسلاسة)
    function animate() {
      requestAnimationFrame(animate);

      // تحريك المكعب للأمام
      cube.position.z -= speed;

      // الكاميرا تتبع المكعب
      camera.position.z = cube.position.z + 4.5;
      camera.position.y = 2.5;
      camera.position.x = cube.position.x * 0.8;
      camera.lookAt(cube.position.x, 1, cube.position.z - 5);

      // فحص الوصول للأبواب
      if (cube.position.z <= currentDoorZ) {
        let x = cube.position.x;
        let chosen = "أصفر";
        if (x > 1.2) chosen = "أحمر";
        else if (x > 0) chosen = "أزرق";
        else if (x > -1.2) chosen = "أخضر";

        if (chosen === targetColor) {
          score++;
          document.getElementById('score').innerText = "النتيجة: " + score;
          
          // زيادة السرعة
          if (score >= 20) speed = 0.35;
          else if (score >= 15) speed = 0.30;
          else if (score >= 10) speed = 0.25;
          else if (score >= 5) speed = 0.20;

          currentDoorZ -= 15;
          doorsParent.position.z = currentDoorZ;
          updateTarget();
        } else {
          // خسارة وتصفير
          score = 0;
          speed = 0.15;
          document.getElementById('score').innerText = "النتيجة: 0";
          cube.position.set(0, 0.4, 25);
          currentDoorZ = 10;
          doorsGroup.position.z = 10;
          updateTarget();
        }
      }

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
