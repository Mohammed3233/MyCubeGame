<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>لعبة الأبواب والمكعب</title>
  <style>
    * { touch-action: none; box-sizing: border-box; }
    body { margin: 0; padding: 0; overflow: hidden; background: #111; font-family: sans-serif; }
    
    /* شاشة البداية */
    #start-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }
    #start-btn {
      padding: 15px 40px;
      font-size: 22px;
      font-weight: bold;
      color: #fff;
      background: #28a745;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    }
    #start-btn:hover { background: #218838; }

    /* النتيجة العليا */
    #score-ui {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      font-weight: bold;
      color: #fff;
      background: rgba(0, 0, 0, 0.7);
      padding: 8px 20px;
      border-radius: 20px;
      z-index: 999;
      pointer-events: none;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div id="start-screen">
    <h1 style="color: #fff; margin-bottom: 20px;">وقت ممتع!</h1>
    <button id="start-btn" onclick="startGame()">ابدأ اللعب</button>
  </div>

  <div id="score-ui">النتيجة: 0</div>

  <script>
    let score = 0;
    let baseSpeed = 0.12;
    let currentSpeed = 0.12;
    let gameStarted = false;

    let targetColorText = "أخضر";
    const colorsMap = { 
      "أصفر": 0xffff00, 
      "أخضر": 0x00ff00, 
      "أزرق": 0x0000ff, 
      "أحمر": 0xff0000 
    };
    const colorNames = ["أصفر", "أخضر", "أزرق", "أحمر"];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1.2);
    light.position.set(0, 15, 10);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x777777));

    // أرضية الممر
    const floorGeo = new THREE.BoxGeometry(6, 0.1, 2000);
    const floorMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.position.set(0, -0.05, -1000);
    scene.add(floor);

    // المكعب - أبيض دائماً
    const cubeGeo = new THREE.BoxGeometry(0.7, 0.7, 0.7);
    const cubeMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
    const cube = new THREE.Mesh(cubeGeo, cubeMat);
    cube.position.set(0, 0.35, 0);
    scene.add(cube);

    // مجموعة الأبواب
    const doorsGroup = new THREE.Group();
    doorsGroup.position.set(0, 0, -15);
    scene.add(doorsGroup);

    // إنشاء الأبواب المتلاصقة
    const doorWidth = 1.25;
    const doorPositions = [-1.875, -0.625, 0.625, 1.875]; 

    doorPositions.forEach((x, i) => {
      const doorGeo = new THREE.BoxGeometry(doorWidth, 2.2, 0.2);
      const doorMat = new THREE.MeshLambertMaterial({ color: colorsMap[colorNames[i]] });
      const door = new THREE.Mesh(doorGeo, doorMat);
      door.position.set(x, 1.1, 0);
      doorsGroup.add(door);
    });

    // إنشاء مستطيل اللوحة المباشر فوق الأبواب في البيئة ثلاثية الأبعاد
    const signCanvas = document.createElement('canvas');
    signCanvas.width = 512;
    signCanvas.height = 128;
    const signCtx = signCanvas.getContext('2d');

    const signTexture = new THREE.CanvasTexture(signCanvas);
    const signGeo = new THREE.PlaneGeometry(3.5, 0.9);
    const signMat = new THREE.MeshBasicMaterial({ map: signTexture, transparent: true });
    const signMesh = new THREE.Mesh(signGeo, signMat);
    
    // وضع المستطيل فوق منتصف الأبواب مباشرة
    signMesh.position.set(0, 2.8, 0);
    doorsGroup.add(signMesh);

    let currentDoorZ = -15;
    let isDragging = false;
    let previousX = 0;

    window.addEventListener('pointerdown', (e) => { 
      if(gameStarted) {
        isDragging = true; 
        previousX = e.clientX; 
      }
    });
    window.addEventListener('pointerup', () => { isDragging = false; });
    window.addEventListener('pointermove', (e) => {
      if (isDragging && gameStarted) {
        const deltaX = (e.clientX - previousX) * 0.012;
        // حركة مستقيمة أفقية
        cube.position.x = Math.max(-2.1, Math.min(2.1, cube.position.x + deltaX));
        previousX = e.clientX;
      }
    });

    // رسم اللوحة فوق الأبواب بألوان مضللة
    function renderSign(text, textColorHex) {
      // خلفية اللوحة
      signCtx.fillStyle = 'rgba(0, 0, 0, 0.85)';
      signCtx.fillRect(0, 0, signCanvas.width, signCanvas.height);

      // إطار اللوحة
      signCtx.strokeStyle = '#ffffff';
      signCtx.lineWidth = 8;
      signCtx.strokeRect(4, 4, signCanvas.width - 8, signCanvas.height - 8);

      // كتابة النص
      signCtx.fillStyle = textColorHex;
      signCtx.font = 'Bold 55px sans-serif';
      signCtx.textAlign = 'center';
      signCtx.textBaseline = 'middle';
      signCtx.fillText(text, signCanvas.width / 2, signCanvas.height / 2);

      signTexture.needsUpdate = true;
    }

    function updateTarget() {
      // اختيار الكلمة المطلوبة (اسم اللون)
      targetColorText = colorNames[Math.floor(Math.random() * colorNames.length)];
      
      // اختيار لون مختلف لنص الكلمة للتمويه (مثال: اسم اللون أخضر، ولون الخط أحمر)
      let otherColors = colorNames.filter(c => c !== targetColorText);
      let textColorName = otherColors[Math.floor(Math.random() * otherColors.length)];
      let textColorHex = '#' + colorsMap[textColorName].toString(16).padStart(6, '0');

      renderSign(targetColorText, textColorHex);
    }

    function startGame() {
      document.getElementById('start-screen').style.display = 'none';
      gameStarted = true;
      resetGame();
    }

    function resetGame() {
      score = 0;
      currentSpeed = baseSpeed;
      document.getElementById('score-ui').innerText = "النتيجة: 0";
      cube.position.set(0, 0.35, 0);
      currentDoorZ = -15;
      doorsGroup.position.z = -15;
      updateTarget();
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);

      if (gameStarted) {
        // تحريك المكعب للأمام
        cube.position.z -= currentSpeed;

        // الكاميرا مثبتة وتتحرك بخط مستقيم
        camera.position.z = cube.position.z + 6;
        camera.position.y = 4.2;
        camera.position.x = 0; 
        camera.lookAt(0, 0.5, cube.position.z - 4);

        // اجتياز الأبواب
        if (cube.position.z <= currentDoorZ) {
          let x = cube.position.x;
          let chosen = "أصفر";
          if (x > 1.25) chosen = "أحمر";
          else if (x > 0) chosen = "أزرق";
          else if (x > -1.25) chosen = "أخضر";

          if (chosen === targetColorText) {
            score++;
            document.getElementById('score-ui').innerText = "النتيجة: " + score;
            
            // زيادة السرعة بمقدار كبير كل 5 نقاط
            if (score % 5 === 0) {
              currentSpeed += 0.07;
            }

            currentDoorZ -= 25;
            doorsGroup.position.z = currentDoorZ;
            updateTarget();
          } else {
            resetGame();
          }
        }
      }

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
